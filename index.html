<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shina Foo — Creative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="cursor default-cursor" id="cursor"></div>

  <div class="tooltip" id="tooltip">
    <div class="tooltip-inner">
      <span class="tooltip-label" id="tt-label"></span>
      <span class="tooltip-desc" id="tt-desc"></span>
      <a href="#" class="tooltip-link" id="tt-link"></a>
    </div>
  </div>

  <div class="loader" id="loader">
    <span class="loader-num" id="loader-num">0</span>
    <span class="loader-label">entering the room</span>
  </div>

  <div class="hanging-string" id="hanging-string"></div>

  <header class="site-header" id="site-header">
    <a href="index.html" class="nav-logo">Shina Foo</a>
    <span class="nav-page-name">Furnishing My Room</span>
  </header>

  <main class="stage" id="stage">
    <div class="frame-mount">
      <div class="frame-border">
        <div class="room-image" id="room-image">
          <img src="Portfoliov2.jpg" alt="Shina's Room" id="room-img" />

          <!-- ① BOOKS -->
          <div class="zone"
            data-emoji="📖"
            data-label="The Shelf"
            data-desc="Essays & Writing"
            data-href="https://shinafoo.substack.com/"
            data-link-text="Substack ↗"
            data-external="true"
            style="top:5%; left:32%; width:18%; height:18%;">
          </div>

          <!-- ② CANVAS / EASEL -->
          <div class="zone"
            data-emoji="🎨"
            data-label="The Canvas"
            data-desc="Art & Illustration"
            data-href="https://www.instagram.com/shizudio?igsh=MXN2NzVsZ2FocmdsYw%3D%3D&utm_source=qr"
            data-link-text="Instagram Art ↗"
            data-external="true"
            style="top:10%; left:60%; width:22%; height:55%;">
          </div>

          <!-- ③ BED -->
          <div class="zone"
            data-emoji="🛏"
            data-label="The Bed"
            data-desc="Who I Am"
            data-href="about.html"
            data-link-text="About ↗"
            data-external="false"
            style="top:28%; left:18%; width:42%; height:38%;">
          </div>

          <!-- ④ LAMP -->
          <div class="zone"
            data-emoji="🪔"
            data-label="The Light"
            data-desc="Get in Touch"
            data-href="mailto:shizudio.eth@gmail.com"
            data-link-text="Email ↗"
            data-external="true"
            style="top:60%; left:6%; width:14%; height:28%;">
          </div>

          <!-- ⑤ FUJIFILM CAMERA -->
          <div class="zone"
            data-emoji="📷"
            data-label="The Fujifilm Camera"
            data-desc="Photography"
            data-href="photography.html"
            data-link-text="View Work ↗"
            data-external="false"
            style="top:62%; left:22%; width:16%; height:22%;">
          </div>

          <!-- ⑥ IPHONE -->
          <div class="zone"
            data-emoji="📱"
            data-label="The Phone"
            data-desc="Thoughts & Updates"
            data-href="https://x.com/shizudio"
            data-link-text="X / Twitter ↗"
            data-external="true"
            style="top:68%; left:44%; width:10%; height:20%;">
          </div>

          <!-- ⑦ LAPTOP -->
          <div class="zone"
            data-emoji="💻"
            data-label="The Laptop"
            data-desc="Work & Projects"
            data-href="https://perena.org"
            data-link-text="Perena.org ↗"
            data-external="true"
            style="top:60%; left:55%; width:24%; height:25%;">
          </div>

        </div>
      </div>
    </div>

    <!-- Mobile: tappable link list for zones -->
    <div class="mobile-links" id="mobile-links">
      <a href="https://shinafoo.substack.com/" target="_blank" class="mobile-link">
        <span class="mobile-link-emoji">📖</span>
        <span class="mobile-link-text">
          <span class="mobile-link-label">The Shelf</span>
          <span class="mobile-link-desc">Essays & Writing</span>
        </span>
      </a>
      <a href="https://www.instagram.com/shizudio" target="_blank" class="mobile-link">
        <span class="mobile-link-emoji">🎨</span>
        <span class="mobile-link-text">
          <span class="mobile-link-label">The Canvas</span>
          <span class="mobile-link-desc">Art & Illustration</span>
        </span>
      </a>
      <a href="about.html" class="mobile-link">
        <span class="mobile-link-emoji">🛏</span>
        <span class="mobile-link-text">
          <span class="mobile-link-label">The Bed</span>
          <span class="mobile-link-desc">Who I Am</span>
        </span>
      </a>
      <a href="mailto:shizudio.eth@gmail.com" class="mobile-link">
        <span class="mobile-link-emoji">🪔</span>
        <span class="mobile-link-text">
          <span class="mobile-link-label">The Light</span>
          <span class="mobile-link-desc">Get in Touch</span>
        </span>
      </a>
      <a href="photography.html" class="mobile-link">
        <span class="mobile-link-emoji">📷</span>
        <span class="mobile-link-text">
          <span class="mobile-link-label">The Fujifilm Camera</span>
          <span class="mobile-link-desc">Photography</span>
        </span>
      </a>
      <a href="https://x.com/shizudio" target="_blank" class="mobile-link">
        <span class="mobile-link-emoji">📱</span>
        <span class="mobile-link-text">
          <span class="mobile-link-label">The Phone</span>
          <span class="mobile-link-desc">Thoughts & Updates</span>
        </span>
      </a>
      <a href="https://perena.org" target="_blank" class="mobile-link">
        <span class="mobile-link-emoji">💻</span>
        <span class="mobile-link-text">
          <span class="mobile-link-label">The Laptop</span>
          <span class="mobile-link-desc">Work & Projects</span>
        </span>
      </a>
    </div>
  </main>

  <footer class="site-footer" id="site-footer">
    <span class="footer-hint">explore the room</span>
  </footer>

  <script type="module" src="script.js"></script>
  <script type="module" src="index.js"></script>
</body>
</html>
