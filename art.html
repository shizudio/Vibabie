<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art & Illustration — Shina Foo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="vinyl.css">
  <link rel="stylesheet" href="art.css">
</head>
<body class="art-body">

  <div class="cursor default-cursor" id="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Shina Foo</a>
    <span class="nav-page-name">The Canvas</span>
  </nav>

  <main class="art-stage">

    <!-- ── Floating page heading ── -->
    <header class="stage-head">
      <h1 class="page-h1 fade-up" style="--i:0">Drawn things.</h1>
      <p class="stage-hint fade-up" style="--i:1">Scroll to wander the line ↔</p>
    </header>

    <!-- ── Serpentine carousel ── -->
    <div class="track-viewport" id="viewport">
      <div class="track" id="track">
        <!-- cards + sketch pile injected by art.js -->
      </div>
    </div>

    <!-- ── Centred caption for the focal piece ── -->
    <div class="deck-caption" id="deck-caption" aria-live="polite">
      <span class="deck-caption-title" id="deck-caption-title"></span>
      <span class="deck-caption-meta" id="deck-caption-meta"></span>
    </div>

    <!-- ── Bottom progress rail ── -->
    <div class="progress-rail" id="rail">
      <span class="rail-count" id="rail-count">01 / 01</span>
      <div class="rail-line" id="rail-line">
        <div class="rail-fill" id="rail-fill"></div>
        <!-- ticks injected by art.js -->
      </div>
    </div>

  </main>

  <!-- ── Sketches grid modal ── -->
  <div class="sketch-modal" id="sketch-modal" aria-hidden="true">
    <div class="sketch-modal-panel">
      <header class="sketch-modal-head">
        <div>
          <span class="sketch-modal-kicker">Loose studies</span>
          <h2 class="sketch-modal-title">The Sketchbook</h2>
        </div>
        <button class="sketch-modal-close" id="sketch-modal-close" aria-label="Close">&#x2715;</button>
      </header>
      <div class="sketch-grid" id="sketch-grid">
        <!-- injected by art.js -->
      </div>
    </div>
  </div>

  <!-- ── Lightbox ── -->
  <div class="art-lightbox" id="art-lightbox" aria-hidden="true">
    <button class="art-lb-close" id="art-lb-close" aria-label="Close">&#x2715;</button>
    <div class="art-lb-inner">
      <img class="art-lb-img" id="art-lb-img" src="" alt="" />
      <p class="art-lb-caption" id="art-lb-caption"></p>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="vinyl-widget.js"></script>
  <script type="module" src="art.js"></script>
</body>
</html>
