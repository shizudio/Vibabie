<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art & Illustration — Shina Foo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@200;300;400&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="vinyl.css">
  <link rel="stylesheet" href="art.css">
</head>
<body>

  <div class="cursor default-cursor" id="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Shina Foo</a>
    <span class="nav-page-name">The Canvas</span>
  </nav>

  <main class="art-page">

    <!-- ── Left: fixed catalog sidebar ── -->
    <aside class="catalog-sidebar" id="catalog-sidebar">
      <div class="catalog-top">
        <span class="page-label fade-up" style="--i:0">The Canvas — Art & Illustration</span>
        <h1 class="page-h1 fade-up" style="--i:1">Drawn things.</h1>
        <div class="divider fade-up" style="--i:2"></div>
      </div>

      <ul class="catalog-index" id="catalog-index">
        <!-- injected by art.js -->
      </ul>

      <footer class="catalog-sidebar-footer fade-up" style="--i:20">
        <a class="catalog-ig" href="https://www.instagram.com/shizudio" target="_blank" rel="noopener noreferrer">
          Instagram ↗
        </a>
      </footer>
    </aside>

    <!-- ── Right: scrollable editorial gallery ── -->
    <div class="catalog-gallery" id="catalog-gallery">
      <!-- injected by art.js -->
    </div>

  </main>

  <!-- Lightbox -->
  <div class="art-lightbox" id="art-lightbox" aria-hidden="true">
    <button class="art-lb-close" id="art-lb-close" aria-label="Close">&#x2715;</button>
    <div class="art-lb-inner">
      <img class="art-lb-img" id="art-lb-img" src="" alt="" />
      <p class="art-lb-caption" id="art-lb-caption"></p>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="vinyl-widget.js"></script>
  <script type="module" src="art.js"></script>
</body>
</html>
