<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shina's Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="cosmos.css">
  <link rel="stylesheet" href="photography.css">
</head>
<body>

  <div class="cursor default-cursor" id="cursor"></div>

  <!-- Lightbox -->
  <div class="photo-lightbox" id="photo-lightbox" aria-hidden="true">
    <button class="photo-lb-close" id="photo-lb-close" aria-label="Close">✕</button>
    <div class="photo-lb-inner">
      <img class="photo-lb-img" id="photo-lb-img" src="" alt="" />
      <p class="photo-lb-caption" id="photo-lb-caption"></p>
    </div>
  </div>

  <nav>
    <a href="index.html" class="nav-logo">Shina Foo</a>
    <span class="nav-page-name">Photography</span>
  </nav>

  <main class="photo-page">

    <header class="cosmos-header fade-up">
      <div class="cosmos-meta">
        <span class="cosmos-collection-label">The Fujifilm Camera — Photography</span>
        <h1 class="cosmos-title">Through the lens.</h1>
      </div>
      <a
        href="https://www.instagram.com/shinana.ya"
        class="cosmos-external-link"
        target="_blank"
        rel="noopener noreferrer"
      >View on Instagram ↗</a>
    </header>

  <!-- PHOTO GRID -->
  <div class="grid">

    <div class="grid-item" data-caption="A Tokyo coffee shop caught sideways, the world still moving through it.">
      <img loading="eager" src="photography/Pic1.JPG" alt="Tokyo coffee shop" />
    </div>

    <div class="grid-item" data-caption="Two friends mid-conversation, a yellow truck passing behind them like punctuation.">
      <img loading="eager" src="photography/Pic2.JPG" alt="Two friends on a street" />
    </div>

    <div class="grid-item" data-caption="A late-night produce market in Japan, colour louder than the hour.">
      <img loading="eager" src="photography/Pic3.JPG" alt="Night market in Japan" />
    </div>

    <div class="grid-item" data-caption="Beneath a tangle of wires and signage, she reaches for something just out of frame.">
      <img loading="lazy" src="photography/Pic4.JPG" alt="Street scene Japan" />
    </div>

    <div class="grid-item" data-caption="Hands peeling a mandarin slowly, the evening asking nothing more of anyone.">
      <img loading="lazy" src="photography/Pic5.jpg" alt="Hands peeling a mandarin" />
    </div>

    <div class="grid-item" data-caption="A red postbox beside hydrangeas, as if the flowers had something to send.">
      <img loading="lazy" src="photography/Pic6.JPG" alt="Japanese postbox and hydrangeas" />
    </div>

    <div class="grid-item" data-caption="A curved bridge glimpsed through branches, half-hidden and unhurried.">
      <img loading="lazy" src="photography/Pic7.JPG" alt="Bridge through foliage" />
    </div>

    <div class="grid-item" data-caption="A white rose let itself go, petals scattered like a quiet admission.">
      <img loading="lazy" src="photography/Pic8.jpeg" alt="Fallen white rose" />
    </div>

    <div class="grid-item" data-caption="Pink roses past their peak, still insisting on being seen.">
      <img loading="lazy" src="photography/Pic9.JPG" alt="Wilting pink roses" />
    </div>

  </div>

    <footer class="cosmos-footer fade-up">
      <span class="cosmos-updated">Shot on Fujifilm X-T series</span>
      <a
        href="https://www.instagram.com/shinana.ya"
        class="cosmos-view-all"
        target="_blank"
        rel="noopener noreferrer"
      >@shinana.ya ↗</a>
    </footer>

  </main>

  <script type="module" src="script.js"></script>
  <script type="module" src="photography.js"></script>
</body>
</html>
