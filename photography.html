<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shina's Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="cosmos.css">
  <link rel="stylesheet" href="photography.css">
</head>
<body>

  <div class="cursor default-cursor" id="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Shina Foo</a>
    <span class="nav-page-name">Photography</span>
  </nav>

  <main class="photo-page">

    <header class="cosmos-header fade-up">
      <div class="cosmos-meta">
        <span class="cosmos-collection-label">The Fujifilm Camera — Photography</span>
        <h1 class="cosmos-title">Through the lens.</h1>
      </div>
      <a
        href="https://www.instagram.com/shinana.ya"
        class="cosmos-external-link"
        target="_blank"
        rel="noopener noreferrer"
      >View on Instagram ↗</a>
    </header>

  <!-- PHOTO GRID -->
  <div class="grid">

    <div class="grid-item">
        <img loading="lazy" src="photography/Pic1.JPG" alt="my photo" />
      </div>

    <div class="grid-item">
        <img loading="lazy" src="photography/Pic2.JPG" alt="my photo" />
    </div>

    <div class="grid-item">
        <img loading="lazy" src="photography/Pic3.JPG" alt="my photo" />
    </div>

    <div class="grid-item">
        <img loading="lazy" src="photography/Pic4.JPG" alt="my photo" />
    </div>

    <div class="grid-item">
        <img loading="lazy" src="photography/Pic5.jpg" alt="my photo" />
    </div>

    <div class="grid-item">
        <img loading="lazy" src="photography/Pic6.JPG" alt="my photo" />
    </div>

    <div class="grid-item">
        <img loading="lazy" src="photography/Pic7.JPG" alt="my photo" />
    </div>

    <div class="grid-item">
        <img loading="lazy" src="photography/Pic8.jpeg" alt="my photo" />
    </div>

    <div class="grid-item">
        <img loading="lazy" src="photography/Pic9.JPG" alt="my photo" />
    </div>

  </div>

    <footer class="cosmos-footer fade-up">
      <span class="cosmos-updated">Shot on Fujifilm X-T series</span>
      <a
        href="https://www.instagram.com/shinana.ya"
        class="cosmos-view-all"
        target="_blank"
        rel="noopener noreferrer"
      >@shinana.ya ↗</a>
    </footer>

  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
