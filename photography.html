<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shina's Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=EB+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="cosmos.css">
  <link rel="stylesheet" href="photography.css">
</head>
<body>

  <div class="cursor default-cursor" id="cursor"></div>

  <!-- Lightbox -->
  <div class="photo-lightbox" id="photo-lightbox" aria-hidden="true">
    <button class="photo-lb-close" id="photo-lb-close" aria-label="Close">✕</button>
    <div class="photo-lb-inner">
      <img class="photo-lb-img" id="photo-lb-img" src="" alt="" />
      <p class="photo-lb-caption" id="photo-lb-caption"></p>
    </div>
  </div>

  <nav>
    <a href="index.html" class="nav-logo">Shina Foo</a>
    <span class="nav-page-name">Photography</span>
  </nav>

  <main class="photo-page">

    <header class="cosmos-header fade-up">
      <div class="cosmos-meta">
        <span class="cosmos-collection-label">The Fujifilm Camera — Photography</span>
        <h1 class="cosmos-title">Through the lens.</h1>
      </div>
      <a
        href="https://www.instagram.com/shinana.ya"
        class="cosmos-external-link"
        target="_blank"
        rel="noopener noreferrer"
      >View on Instagram ↗</a>
    </header>

  <!-- PHOTO GRID — populated by photography.js from photography-manifest.json -->
  <div class="grid"></div>

    <footer class="cosmos-footer fade-up">
      <span class="cosmos-updated">Shot on Fujifilm X-T series</span>
      <a
        href="https://www.instagram.com/shinana.ya"
        class="cosmos-view-all"
        target="_blank"
        rel="noopener noreferrer"
      >@shinana.ya ↗</a>
    </footer>

  </main>

  <script type="module" src="script.js"></script>
  <script type="module" src="photography.js"></script>
</body>
</html>
